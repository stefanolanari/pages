<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Biker Calvo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #222;
        }

        #ui {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            z-index: 10;
        }

        .stat { text-align: center; }
        .stat-label { font-size: 0.6em; opacity: 0.8; }
        .stat-value { font-size: 1.2em; font-weight: bold; }

        h1 { font-size: 0.9em; letter-spacing: 1px; }

        #footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: rgba(0,0,0,0.5);
            z-index: 10;
        }

        #message {
            color: #FFD700;
            font-size: 0.85em;
            font-weight: bold;
            flex: 1;
            text-align: center;
        }

        #restartBtn {
            padding: 6px 14px;
            font-size: 0.85em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #f44336;
            color: white;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="stat">
            <div class="stat-label">CAPELLI</div>
            <div class="stat-value"><span id="hairCount">0</span>/20</div>
        </div>
        <h1>🏍️ BIKER CALVO</h1>
        <div class="stat">
            <div class="stat-label">LIVELLO</div>
            <div class="stat-value" id="level">1</div>
        </div>
    </div>

    <div id="footer">
        <div id="message">💥 Urta gli oggetti con la testa!</div>
        <button id="restartBtn">🔄</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let W = window.innerWidth;
        let H = window.innerHeight;

        let gameState = { hairCount: 0, level: 1, gameOver: false, maxHairs: 20 };
        let biker = { x: W / 2, y: H - 90, headX: 0, headY: -14, headRadius: 10 };
        let obstacles = [], particles = [];
        let mouse = { x: W / 2 };

        function resizeCanvas() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            biker.y = H - 90;
            biker.x = Math.max(30, Math.min(W - 30, biker.x));
            mouse.x = biker.x;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
        });

        // Touch swipe relativo
        let lastTouchX = null;
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            lastTouchX = e.touches[0].clientX;
        }, { passive: false });
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const tx = e.touches[0].clientX;
            if (lastTouchX !== null) {
                const delta = tx - lastTouchX;
                mouse.x = Math.max(30, Math.min(W - 30, mouse.x + delta * 1.5));
            }
            lastTouchX = tx;
        }, { passive: false });
        document.addEventListener('touchend', () => { lastTouchX = null; });

        document.getElementById('restartBtn').addEventListener('click', () => location.reload());

        function drawBiker() {
            ctx.save();
            ctx.translate(biker.x, biker.y);

            // Ruote
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.arc(-12, 35, 8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(12, 35, 8, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(-12, 35, 6, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(12, 35, 6, 0, Math.PI * 2); ctx.stroke();

            // Carena
            ctx.fillStyle = '#FF0000';
            ctx.beginPath(); ctx.ellipse(-8, 18, 10, 8, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#CC0000';
            ctx.fillRect(-10, 8, 20, 12);
            ctx.fillRect(-12, 15, 24, 6);

            // Motore
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-8, 20, 16, 10);
            ctx.fillStyle = '#D3D3D3'; ctx.fillRect(10, 22, 4, 6);

            // Manubrio
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-6, 8); ctx.lineTo(-6, 0); ctx.lineTo(-10, 2); ctx.lineTo(-2, 2); ctx.stroke();
            ctx.fillStyle = '#333'; ctx.fillRect(-8, 8, 16, 4);

            // Faro
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.arc(-5, 15, 2, 0, Math.PI * 2); ctx.fill();

            // Corpo pilota
            ctx.fillStyle = '#FF6347'; ctx.fillRect(-7, -8, 14, 12);
            ctx.fillStyle = '#222'; ctx.fillRect(-8, -8, 16, 4);

            // Testa
            ctx.fillStyle = '#F4A460';
            ctx.beginPath(); ctx.arc(0, -14, 10, 0, Math.PI * 2); ctx.fill();

            // Capelli
            for (let i = 0; i < gameState.hairCount; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const len = 6 + gameState.hairCount * 0.3;
                ctx.beginPath();
                ctx.moveTo(Math.cos(angle) * 10, Math.sin(angle) * 10 - 14);
                ctx.lineTo(Math.cos(angle) * (10 + len), Math.sin(angle) * (10 + len) - 14);
                ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2.5; ctx.stroke();
            }

            // Occhi
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(-4, -15, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(4, -15, 1.5, 0, Math.PI * 2); ctx.fill();

            // Sorriso
            ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(0, -12, 3, 0, Math.PI, false); ctx.stroke();

            ctx.restore();
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.fillStyle = '#FF4500';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#000';
                ctx.fillRect(obs.x + 5, obs.y + 5, 4, 4);
                ctx.fillRect(obs.x + obs.width - 9, obs.y + 5, 4, 4);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(obs.x + 8, obs.y + 15);
                ctx.lineTo(obs.x + obs.width - 8, obs.y + 15);
                ctx.stroke();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1;
        }

        function spawnObstacle() {
            const size = 25;
            obstacles.push({
                x: Math.random() * (W - size),
                y: -size, width: size, height: size,
                speed: 1.5 + gameState.level * 0.5,
                hit: false
            });
        }

        function checkHeadCollision(hx, hy, hr, rx, ry, rw, rh) {
            const cx = Math.max(rx, Math.min(hx, rx + rw));
            const cy = Math.max(ry, Math.min(hy, ry + rh));
            return (hx - cx) ** 2 + (hy - cy) ** 2 < hr * hr;
        }

        function update() {
            if (gameState.gameOver) return;

            biker.x += (mouse.x - biker.x) * 0.15;
            biker.x = Math.max(30, Math.min(W - 30, biker.x));
            biker.y = H - 90;

            const hx = biker.x + biker.headX;
            const hy = biker.y + biker.headY;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += obs.speed;

                if (!obs.hit && checkHeadCollision(hx, hy, biker.headRadius, obs.x, obs.y, obs.width, obs.height)) {
                    obs.hit = true;
                    gameState.hairCount++;
                    for (let j = 0; j < 15; j++) {
                        particles.push({
                            x: obs.x + obs.width / 2, y: obs.y + obs.height / 2,
                            vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 2,
                            life: 40, maxLife: 40, color: '#FFD700'
                        });
                    }
                    if (gameState.hairCount >= gameState.maxHairs) levelUp();
                }

                if (obs.y > H) obstacles.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            document.getElementById('hairCount').textContent = gameState.hairCount;
            document.getElementById('level').textContent = gameState.level;
        }

        function levelUp() {
            gameState.level++;
            gameState.hairCount = 0;
            const msg = document.getElementById('message');
            msg.textContent = '⭐ LIVELLO ' + gameState.level + '! Più veloce!';
            setTimeout(() => { msg.textContent = '💥 Urta gli oggetti con la testa!'; }, 2000);
        }

        function draw() {
            drawBackground();
            drawBiker();
            drawObstacles();
            drawParticles();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        setInterval(() => {
            if (!gameState.gameOver) spawnObstacle();
        }, Math.max(700, 1400 - gameState.level * 150));

        gameLoop();
    </script>
</body>
</html>
